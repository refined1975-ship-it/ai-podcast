<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-title" content="DAIR">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>デイリーAIラジオ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #eee; max-width: 700px; margin: 0 auto; padding: 20px; padding-top: env(safe-area-inset-top, 20px); padding-bottom: 120px; }
header { text-align: center; padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
header img { width: 120px; height: 120px; border-radius: 16px; margin-bottom: 12px; }
h1 { font-size: 22px; color: #fff; }
.subtitle { color: #666; font-size: 14px; margin-top: 4px; }
.tabs { display: flex; border-bottom: 1px solid #222; margin-bottom: 16px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #ff6b35; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.track { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid #222; border-radius: 10px; background: #111; margin-bottom: 8px; cursor: pointer; }
.track:active { background: #1a1a1a; }
.track.playing { border-color: #ff6b35; }
.track-play { width: 36px; height: 36px; border-radius: 50%; border: none; background: #ff6b35; color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.track-play:active { background: #e55a2a; }
.track-info { flex: 1; min-width: 0; }
.track-title { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { font-size: 12px; color: #888; margin-top: 2px; }
.track-cache { font-size: 12px; color: transparent; flex-shrink: 0; }
.track-cache.cached { color: #34c759; }
.ep-details { font-size: 13px; color: #aaa; margin-top: -4px; margin-bottom: 8px; padding: 0 12px; }
.ep-details summary { cursor: pointer; font-weight: 600; margin-bottom: 6px; color: #ccc; }
.ep-details .desc { white-space: pre-wrap; font-family: inherit; margin-top: 6px; line-height: 1.6; font-size: 13px; }
.va-empty { text-align: center; color: #555; font-size: 13px; padding: 30px 0; }
.player { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #222; padding: 10px 16px; display: none; z-index: 100; }
.player.active { display: block; }
.player-title { font-size: 12px; color: #aaa; margin-bottom: 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-controls { display: flex; align-items: center; gap: 12px; }
.player-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #ff6b35; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }
.player-btn:active { background: #e55a2a; }
.player-progress { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; cursor: pointer; }
.player-progress-fill { height: 100%; background: #ff6b35; border-radius: 2px; width: 0%; }
.player-time { font-size: 11px; color: #666; flex-shrink: 0; }
.ch-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 16px; }
.ch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ch-header h3 { font-size: 14px; color: #aaa; }
.ch-toggle { padding: 4px 10px; border: 1px solid #333; border-radius: 6px; background: none; color: #aaa; font-size: 12px; cursor: pointer; }
.ch-toggle:active { background: #222; }
.ch-search { display: none; margin-bottom: 12px; }
.ch-search.open { display: block; }
.ch-input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; font-size: 14px; outline: none; }
.ch-input:focus { border-color: #ff6b35; }
.ch-results { margin-top: 8px; }
.ch-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 1px solid #222; border-radius: 8px; background: #111; margin-bottom: 6px; }
.ch-name { font-size: 13px; color: #fff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-add { padding: 4px 12px; border: 1px solid #ff6b35; border-radius: 6px; background: none; color: #ff6b35; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-add:active { background: #ff6b35; color: #fff; }
.ch-sub { padding: 4px 12px; border: 1px solid #333; border-radius: 6px; background: none; color: #aaa; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-sub.subscribed { color: #34c759; border-color: #34c759; }
.ch-unsub { padding: 4px 12px; border: 1px solid #ff3b30; border-radius: 6px; background: none; color: #ff3b30; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-unsub:active { background: #ff3b30; color: #fff; }
.disclaimer { margin-top: 24px; padding: 12px; background: #111; border-radius: 8px; font-size: 12px; color: #555; text-align: center; }
.reload-btn { margin-top: 8px; padding: 6px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; font-size: 13px; color: #aaa; cursor: pointer; }
.reload-btn:active { background: #222; }
</style>
</head>
<body>
<header>
  <img src="artwork.jpg" alt="デイリーAIラジオ">
  <h1>デイリーAIラジオ</h1>
  <p class="subtitle">DAILY AI RADIO</p>
  <button class="reload-btn" onclick="location.reload()">↻ 更新</button>
</header>

<div class="tabs">
  <div class="tab active" data-tab="radio">ラジオ</div>
  <div class="tab" data-tab="youtube">YouTube音声</div>
</div>

<div class="tab-content active" id="tab-radio">
  <div id="episodes"></div>
</div>

<div class="tab-content" id="tab-youtube">
  <div id="va-list"></div>
  <div class="ch-section">
    <div class="ch-header">
      <h3>登録チャンネル</h3>
      <div style="display:flex;gap:6px">
        <button class="ch-toggle" id="ch-edit">編集</button>
        <button class="ch-toggle" id="ch-toggle">検索</button>
      </div>
    </div>
    <div class="ch-search" id="ch-search">
      <input class="ch-input" id="ch-query" placeholder="チャンネル名で検索..." />
      <div class="ch-results" id="ch-results"></div>
    </div>
    <div id="ch-list"></div>
  </div>
</div>

<!-- 共有プレーヤー（music-playerと同じ: audio要素1つ、controls無し） -->
<div class="player" id="player">
  <div class="player-title" id="playerTitle">-</div>
  <div class="player-controls">
    <button class="player-btn" id="playerBtn">▶</button>
    <div class="player-progress" id="playerProgress">
      <div class="player-progress-fill" id="playerFill"></div>
    </div>
    <span class="player-time" id="playerTime">0:00</span>
  </div>
</div>
<audio id="audio"></audio>

<div class="disclaimer">
  AI自動生成のため内容の正確性は保証されません
</div>


<script>
const CACHE_NAME = 'dair-v3';
const SILENCE = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
const audio = document.getElementById('audio');
const player = document.getElementById('player');
const playerTitle = document.getElementById('playerTitle');
const playerBtn = document.getElementById('playerBtn');
const playerFill = document.getElementById('playerFill');
const playerTime = document.getElementById('playerTime');
let currentTrackEl = null;

function fmt(s) { const m = Math.floor(s / 60); return m + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }

// 共有プレーヤー: music-playerと同じsilence unlock + blob再生
function playUrl(url, title, artist) {
  if (audio._blobUrl) { URL.revokeObjectURL(audio._blobUrl); audio._blobUrl = null; }

  playerTitle.textContent = title;
  playerBtn.textContent = '⏸';
  player.classList.add('active');

  // music-player方式: silence unlock → blob再生
  // Safariフォールバック: 直接URL再生
  audio.src = SILENCE;
  audio.play().catch(() => {});

  caches.open(CACHE_NAME)
    .then(c => c.match(url, {ignoreSearch: true}))
    .then(r => {
      if (r) return r.blob();
      return fetch(url).then(res => res.blob());
    })
    .then(blob => {
      if (blob && blob.size > 0) {
        audio._blobUrl = URL.createObjectURL(blob);
        audio.src = audio._blobUrl;
      } else {
        audio.src = url;
      }
      return audio.play();
    })
    .catch(() => {
      // blob/cache失敗 → 直接再生
      audio.src = url;
      audio.load();
      audio.play().catch(() => {});
    });

  // MediaSession
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title,
      artist: artist,
      album: artist,
      artwork: [
        { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
    navigator.mediaSession.setActionHandler('seekforward', () => { audio.currentTime += 30; });
  }
}

// プレーヤーUI
playerBtn.addEventListener('click', () => {
  if (audio.paused) { audio.play(); } else { audio.pause(); }
});
audio.addEventListener('play', () => { playerBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playerBtn.textContent = '▶'; });
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    playerFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    playerTime.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
    if ('mediaSession' in navigator && navigator.mediaSession.setPositionState) {
      try {
        navigator.mediaSession.setPositionState({
          duration: audio.duration, playbackRate: audio.playbackRate, position: audio.currentTime,
        });
      } catch(e) {}
    }
  }
});
document.getElementById('playerProgress').addEventListener('click', (e) => {
  if (audio.duration) {
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  }
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'youtube') { findServer().then(() => { loadVideoAudio(); loadChannels(); }); }
  });
});

// ローカルサーバー接続
let MUSIC_SERVER = '';
async function findServer() {
  const candidates = [
    'https://192.168.10.14:8443',
    'https://localhost:8443',
    'http://localhost:8888',
  ];
  for (const url of candidates) {
    try {
      await fetch(url + '/api/watchlist', {signal: AbortSignal.timeout(2000)});
      MUSIC_SERVER = url;
      return;
    } catch {}
  }
}

// YouTube音声
function renderVaTracks(tracks, wl) {
  const list = document.getElementById('va-list');
  list.innerHTML = '';
  if (tracks.length === 0) {
    list.innerHTML = '<div class="va-empty">YouTube音声はありません</div>';
    return;
  }
  const chMap = {};
  wl.forEach(w => { if (w.current_file) chMap[w.current_file] = w.name; });
  tracks.sort((a, b) => b.mtime - a.mtime);
  const server = MUSIC_SERVER || localStorage.getItem('va_server') || '';
  tracks.forEach((t, idx) => {
    const dur = t.duration ? Math.floor(t.duration / 60) + '分' : '';
    const fname = t.id.replace('video-audio/', '');
    const chName = chMap[fname] || '';
    const meta = [chName, dur].filter(Boolean).join(' | ');
    const div = document.createElement('div');
    div.className = 'track';
    const audioUrl = server + '/video-audio/' + encodeURIComponent(fname);
    div.dataset.url = audioUrl;
    div.dataset.title = t.title;
    div.dataset.artist = chName || 'YouTube';
    div.dataset.type = 'va';
    div.innerHTML = `
      <div class="track-play">▶</div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-meta">${meta}</div>
      </div>
      <span class="track-cache"></span>
    `;
    const cacheIcon = div.querySelector('.track-cache');
    caches.open(CACHE_NAME).then(c => c.match(audioUrl)).then(r => {
      if (r) {
        cacheIcon.textContent = '✓'; cacheIcon.classList.add('cached');
      } else if (MUSIC_SERVER) {
        navigator.serviceWorker?.controller?.postMessage({ type: 'CACHE_MP3', url: audioUrl });
      }
    });
    div.addEventListener('click', () => {
      if (currentTrackEl) currentTrackEl.classList.remove('playing');
      div.classList.add('playing');
      currentTrackEl = div;
      playUrl(audioUrl, t.title, chName || 'YouTube');
    });
    list.appendChild(div);
  });
  // 連続再生
  audio.onended = () => {
    if (!currentTrackEl) return;
    const next = currentTrackEl.nextElementSibling;
    if (next && next.classList.contains('track') && next.dataset.type === 'va') {
      next.click();
    }
  };
}

function loadVideoAudio() {
  if (!MUSIC_SERVER) {
    const cached = localStorage.getItem('va_tracks');
    const cachedWl = localStorage.getItem('va_watchlist');
    if (cached) {
      renderVaTracks(JSON.parse(cached), cachedWl ? JSON.parse(cachedWl) : []);
    } else {
      document.getElementById('va-list').innerHTML = '<div class="va-empty">Wi-Fi接続時にデータを取得してください</div>';
    }
    return;
  }
  Promise.all([
    fetch(MUSIC_SERVER + '/api/video-audio').then(r => r.json()),
    fetch(MUSIC_SERVER + '/api/watchlist').then(r => r.json()).catch(() => [])
  ])
    .then(([tracks, wl]) => {
      localStorage.setItem('va_tracks', JSON.stringify(tracks));
      localStorage.setItem('va_watchlist', JSON.stringify(wl));
      localStorage.setItem('va_server', MUSIC_SERVER);
      renderVaTracks(tracks, wl);
    })
    .catch(() => {
      const cached = localStorage.getItem('va_tracks');
      const cachedWl = localStorage.getItem('va_watchlist');
      if (cached) {
        renderVaTracks(JSON.parse(cached), cachedWl ? JSON.parse(cachedWl) : []);
      } else {
        document.getElementById('va-list').innerHTML = '<div class="va-empty">Wi-Fi接続時にデータを取得してください</div>';
      }
    });
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// SW cache完了
navigator.serviceWorker?.addEventListener('message', event => {
  if (event.data.type === 'CACHE_DONE') {
    document.querySelectorAll(`.track-cache`).forEach(ci => {
      const trackDiv = ci.closest('.track');
      if (trackDiv && trackDiv.dataset.url === event.data.url) {
        ci.textContent = '✓'; ci.classList.add('cached');
      }
    });
    // ラジオのep-cache
    const epCache = document.querySelector(`.ep-cache[data-url="${event.data.url}"]`);
    if (epCache) {
      epCache.textContent = '✓ 保存済み'; epCache.style.color = '#34c759';
    }
  }
});

// チャンネル管理
let watchlist = [];
let chEditMode = false;

function loadChannels() {
  if (!MUSIC_SERVER) {
    const cached = localStorage.getItem('va_watchlist');
    if (cached) { watchlist = JSON.parse(cached); renderChannels(); }
    document.getElementById('ch-edit').style.display = 'none';
    document.getElementById('ch-toggle').style.display = 'none';
    return;
  }
  fetch(MUSIC_SERVER + '/api/watchlist')
    .then(r => r.json())
    .then(wl => { watchlist = wl; renderChannels(); })
    .catch(() => {});
}

function renderChannels() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  watchlist.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'ch-item';
    if (chEditMode) {
      div.innerHTML = `<span class="ch-name">${ch.name}</span><button class="ch-unsub">解除</button>`;
      div.querySelector('.ch-unsub').addEventListener('click', () => {
        if (!confirm('「' + ch.name + '」を解除しますか？')) return;
        fetch(MUSIC_SERVER + '/api/watchlist/delete', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: ch.url })
        }).then(() => { watchlist = watchlist.filter(w => w.url !== ch.url); renderChannels(); });
      });
    } else {
      div.innerHTML = `<span class="ch-name">${ch.name}</span>`;
    }
    list.appendChild(div);
  });
}

document.getElementById('ch-edit').addEventListener('click', function() {
  chEditMode = !chEditMode;
  this.textContent = chEditMode ? '完了' : '編集';
  renderChannels();
});

document.getElementById('ch-toggle').addEventListener('click', () => {
  const s = document.getElementById('ch-search');
  s.classList.toggle('open');
  if (s.classList.contains('open')) document.getElementById('ch-query').focus();
});

let searchTimer = null;
document.getElementById('ch-query').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('ch-results').innerHTML = ''; return; }
  searchTimer = setTimeout(() => {
    document.getElementById('ch-results').innerHTML = '<div class="va-empty">検索中...</div>';
    fetch(MUSIC_SERVER + '/api/yt-search-channels', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q })
    })
    .then(r => r.json())
    .then(data => {
      const results = document.getElementById('ch-results');
      results.innerHTML = '';
      if (!data.results || data.results.length === 0) {
        results.innerHTML = '<div class="va-empty">見つかりません</div>';
        return;
      }
      data.results.forEach(ch => {
        const already = watchlist.some(w => w.url === ch.url || w.url === ch.url + '/videos');
        const div = document.createElement('div');
        div.className = 'ch-item';
        div.innerHTML = `
          <span class="ch-name">${ch.name}</span>
          <button class="${already ? 'ch-sub subscribed' : 'ch-add'}">${already ? '登録済' : '登録'}</button>
        `;
        if (!already) {
          div.querySelector('.ch-add').addEventListener('click', function() {
            this.disabled = true; this.textContent = '...';
            fetch(MUSIC_SERVER + '/api/watchlist/add', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: ch.url, name: ch.name, type: 'audio' })
            })
            .then(r => r.json())
            .then(res => {
              if (res.ok) {
                this.textContent = '登録済'; this.className = 'ch-sub subscribed';
                watchlist = res.watchlist; loadChannels();
              } else { this.textContent = res.error || 'エラー'; }
            });
          });
        }
        results.appendChild(div);
      });
    })
    .catch(() => { document.getElementById('ch-results').innerHTML = '<div class="va-empty">検索失敗</div>'; });
  }, 500);
});

// ラジオ（エピソード一覧）
fetch('feed.xml')
  .then(r => r.text())
  .then(async xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = doc.querySelectorAll('item');
    const container = document.getElementById('episodes');

    const sortedItems = Array.from(items).sort((a, b) => {
      const da = new Date(a.querySelector('pubDate')?.textContent || 0);
      const db = new Date(b.querySelector('pubDate')?.textContent || 0);
      return db - da;
    });

    for (const item of sortedItems) {
      const title = item.querySelector('title')?.textContent || '';
      const desc = item.querySelector('description')?.textContent || '';
      const url = item.querySelector('enclosure')?.getAttribute('url') || '';
      const durRaw = item.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', 'duration')[0]?.textContent || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      const date = new Date(pubDate).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      const durParts = durRaw.split(':').map(Number);
      const totalMin = durParts.length === 3 ? durParts[0] * 60 + durParts[1] : durParts[0] || 0;
      const dur = totalMin > 0 ? `${totalMin}分` : durRaw;

      // トラック（タップで共有プレーヤーで再生）
      const div = document.createElement('div');
      div.className = 'track';
      div.dataset.url = url;
      div.dataset.type = 'radio';
      div.innerHTML = `
        <div class="track-play">▶</div>
        <div class="track-info">
          <div class="track-title">${title}</div>
          <div class="track-meta">${date} | ${dur} <span class="ep-cache" data-url="${url}"></span></div>
        </div>
      `;
      container.appendChild(div);

      // 詳細
      if (desc) {
        const details = document.createElement('details');
        details.className = 'ep-details';
        details.innerHTML = `<summary>詳細</summary><div class="desc">${desc}</div>`;
        container.appendChild(details);
      }

      // 自動キャッシュ
      const cacheIcon = div.querySelector('.ep-cache');
      const cache = await caches.open(CACHE_NAME);
      const cached = await cache.match(url);
      if (cached) {
        cacheIcon.textContent = '✓ 保存済み';
        cacheIcon.style.color = '#34c759';
      } else {
        navigator.serviceWorker?.controller?.postMessage({ type: 'CACHE_MP3', url: url });
      }

      // タップで再生
      div.addEventListener('click', () => {
        if (currentTrackEl) currentTrackEl.classList.remove('playing');
        div.classList.add('playing');
        currentTrackEl = div;
        playUrl(url, title, 'デイリーAIラジオ');
      });
    }
  });
</script>
</body>
</html>
