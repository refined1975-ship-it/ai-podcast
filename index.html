<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DAIR">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>デイリーAIラジオ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #eee; max-width: 700px; margin: 0 auto; padding: 20px; padding-top: env(safe-area-inset-top, 20px); }
header { text-align: center; padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
header img { width: 120px; height: 120px; border-radius: 16px; margin-bottom: 12px; }
h1 { font-size: 22px; color: #fff; }
.subtitle { color: #666; font-size: 14px; margin-top: 4px; }
.episode { border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; background: #111; }
.episode h2 { font-size: 16px; margin-bottom: 6px; color: #fff; }
.episode .meta { color: #888; font-size: 13px; margin-bottom: 10px; }
.episode audio { width: 100%; margin-bottom: 10px; filter: invert(1); }
.episode details { font-size: 13px; color: #aaa; }
.episode summary { cursor: pointer; font-weight: 600; margin-bottom: 6px; color: #ccc; }
.episode .desc { white-space: pre-wrap; font-family: inherit; margin-top: 6px; line-height: 1.6; font-size: 13px; }
.ep-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.dl-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; font-size: 13px; color: #aaa; cursor: pointer; }
.dl-btn:active { background: #222; }
.dl-btn.cached { color: #34c759; border-color: #34c759; }
.tabs { display: flex; border-bottom: 1px solid #222; margin-bottom: 16px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #ff6b35; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.va-track { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid #222; border-radius: 10px; background: #111; margin-bottom: 8px; }
.va-info { flex: 1; min-width: 0; }
.va-title { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.va-meta { font-size: 12px; color: #888; margin-top: 2px; }
.va-play { width: 36px; height: 36px; border-radius: 50%; border: none; background: #ff6b35; color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0; }
.va-play:active { background: #e55a2a; }
.va-del { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #333; background: none; color: #666; font-size: 14px; cursor: pointer; flex-shrink: 0; }
.va-del:active { background: #222; }
.va-empty { text-align: center; color: #555; font-size: 13px; padding: 30px 0; }
.va-playing { border-color: #ff6b35; }
.va-cache { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #333; background: none; color: #666; font-size: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.va-cache:active { background: #222; }
.va-cache.cached { color: #34c759; border-color: #34c759; }
.va-player { position: sticky; bottom: 0; background: #0a0a0a; border-top: 1px solid #222; padding: 10px 0; display: none; }
.va-player audio { width: 100%; filter: invert(1); }
.va-player-title { font-size: 12px; color: #aaa; margin-bottom: 4px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.va-dl-bar { margin-bottom: 14px; }
.va-clip-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #ff6b35; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
.va-clip-btn:active { background: #e55a2a; }
.va-clip-btn:disabled { background: #333; color: #666; cursor: default; }
.va-dl-status { margin-top: 8px; font-size: 12px; color: #888; text-align: center; min-height: 16px; }
.va-dl-status.ok { color: #34c759; }
.va-dl-status.err { color: #ff3b30; }
.va-dl-status.loading { color: #ff9500; }
.ch-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 16px; }
.ch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ch-header h3 { font-size: 14px; color: #aaa; }
.ch-toggle { padding: 4px 10px; border: 1px solid #333; border-radius: 6px; background: none; color: #aaa; font-size: 12px; cursor: pointer; }
.ch-toggle:active { background: #222; }
.ch-search { display: none; margin-bottom: 12px; }
.ch-search.open { display: block; }
.ch-input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; font-size: 14px; outline: none; }
.ch-input:focus { border-color: #ff6b35; }
.ch-results { margin-top: 8px; }
.ch-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border: 1px solid #222; border-radius: 8px; background: #111; margin-bottom: 6px; }
.ch-name { font-size: 13px; color: #fff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-add { padding: 4px 12px; border: 1px solid #ff6b35; border-radius: 6px; background: none; color: #ff6b35; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-add:active { background: #ff6b35; color: #fff; }
.ch-sub { padding: 4px 12px; border: 1px solid #333; border-radius: 6px; background: none; color: #aaa; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-sub.subscribed { color: #34c759; border-color: #34c759; }
.ch-unsub { padding: 4px 12px; border: 1px solid #ff3b30; border-radius: 6px; background: none; color: #ff3b30; font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 8px; }
.ch-unsub:active { background: #ff3b30; color: #fff; }
.disclaimer { margin-top: 24px; padding: 12px; background: #111; border-radius: 8px; font-size: 12px; color: #555; text-align: center; }
.install-hint { margin-top: 16px; padding: 12px; background: #111; border-radius: 8px; font-size: 13px; color: #555; text-align: center; display: none; }
.reload-btn { margin-top: 8px; padding: 6px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; font-size: 13px; color: #aaa; cursor: pointer; }
.reload-btn:active { background: #222; }
</style>
</head>
<body>
<header>
  <img src="artwork.jpg" alt="デイリーAIラジオ">
  <h1>デイリーAIラジオ</h1>
  <p class="subtitle">DAILY AI RADIO</p>
  <button class="reload-btn" onclick="location.reload()">↻ 更新</button>
</header>

<div class="tabs">
  <div class="tab active" data-tab="radio">ラジオ</div>
  <div class="tab" data-tab="youtube">YouTube音声</div>
</div>

<div class="tab-content active" id="tab-radio">
  <div id="episodes"></div>
</div>

<div class="tab-content" id="tab-youtube">
  <div class="va-dl-bar">
    <button class="va-clip-btn" id="va-check-btn">新着チェック</button>
    <div class="va-dl-status" id="va-dl-status"></div>
  </div>
  <div id="va-list"></div>
  <div class="ch-section">
    <div class="ch-header">
      <h3>登録チャンネル</h3>
      <div style="display:flex;gap:6px">
        <button class="ch-toggle" id="ch-edit">編集</button>
        <button class="ch-toggle" id="ch-toggle">検索</button>
      </div>
    </div>
    <div class="ch-search" id="ch-search">
      <input class="ch-input" id="ch-query" placeholder="チャンネル名で検索..." />
      <div class="ch-results" id="ch-results"></div>
    </div>
    <div id="ch-list"></div>
  </div>
  <div class="va-player" id="va-player">
    <div class="va-player-title" id="va-player-title"></div>
    <audio controls id="va-audio"></audio>
  </div>
</div>

<div class="disclaimer">
  AI自動生成のため内容の正確性は保証されません
</div>

<div class="install-hint" id="installHint">
  Safari の共有ボタン → 「ホーム画面に追加」でアプリとして使えます
</div>

<script>
// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'youtube') { findServer().then(() => { loadVideoAudio(); loadChannels(); }); }
  });
});

// ローカルサーバー接続
let MUSIC_SERVER = '';
async function findServer() {
  const candidates = [
    'https://192.168.10.14:8443',
    'https://localhost:8443',
    'http://localhost:8888',
  ];
  for (const url of candidates) {
    try {
      await fetch(url + '/api/watchlist', {signal: AbortSignal.timeout(2000)});
      MUSIC_SERVER = url;
      return;
    } catch {}
  }
}

const CACHE_NAME = 'dair-v3';

// YouTube音声
let vaCurrentEl = null;
function loadVideoAudio() {
  const list = document.getElementById('va-list');
  Promise.all([
    fetch(MUSIC_SERVER + '/api/video-audio').then(r => r.json()),
    fetch(MUSIC_SERVER + '/api/watchlist').then(r => r.json()).catch(() => [])
  ])
    .then(([tracks, wl]) => {
      list.innerHTML = '';
      if (tracks.length === 0) {
        list.innerHTML = '<div class="va-empty">YouTube音声はありません</div>';
        return;
      }
      // ファイル名→チャンネル名のマップ
      const chMap = {};
      wl.forEach(w => { if (w.current_file) chMap[w.current_file] = w.name; });
      tracks.sort((a, b) => b.mtime - a.mtime);
      tracks.forEach(t => {
        const dur = t.duration ? Math.floor(t.duration / 60) + '分' : '';
        const fname = t.id.replace('video-audio/', '');
        const chName = chMap[fname] || '';
        const meta = [chName, dur].filter(Boolean).join(' | ');
        const div = document.createElement('div');
        div.className = 'va-track';
        const audioUrl = MUSIC_SERVER + '/video-audio/' + encodeURIComponent(fname);
        div.dataset.vaUrl = audioUrl;
        div.innerHTML = `
          <button class="va-play">▶</button>
          <div class="va-info">
            <div class="va-title">${t.title}</div>
            <div class="va-meta">${meta}</div>
          </div>
          <button class="va-cache">↓</button>
        `;
        // キャッシュ状態チェック
        const cacheBtn = div.querySelector('.va-cache');
        caches.open(CACHE_NAME).then(c => c.match(audioUrl)).then(r => {
          if (r) { cacheBtn.textContent = '✓'; cacheBtn.classList.add('cached'); }
        });
        cacheBtn.addEventListener('click', () => {
          if (cacheBtn.classList.contains('cached')) {
            navigator.serviceWorker?.controller?.postMessage({ type: 'DELETE_CACHE', url: audioUrl });
            cacheBtn.textContent = '↓'; cacheBtn.classList.remove('cached');
          } else {
            cacheBtn.textContent = '…';
            navigator.serviceWorker?.controller?.postMessage({ type: 'CACHE_MP3', url: audioUrl });
          }
        });
        div.querySelector('.va-play').addEventListener('click', () => {
          const audio = document.getElementById('va-audio');
          const player = document.getElementById('va-player');
          const url = audioUrl;
          if (vaCurrentEl) vaCurrentEl.classList.remove('va-playing');
          div.classList.add('va-playing');
          vaCurrentEl = div;
          audio.src = url;
          audio.play();
          player.style.display = 'block';
          document.getElementById('va-player-title').textContent = t.title;
          if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: t.title, artist: 'YouTube', album: 'YouTube音声'
            });
          }
        });
        list.appendChild(div);
      });
    })
    .catch(() => {
      list.innerHTML = '<div class="va-empty">サーバーに接続できません（Wi-Fi接続時のみ）</div>';
    });
}

// 新着チェック
document.getElementById('va-check-btn').addEventListener('click', () => {
  const btn = document.getElementById('va-check-btn');
  const status = document.getElementById('va-dl-status');
  btn.disabled = true;
  btn.textContent = 'チェック中...';
  status.textContent = '登録チャンネルを確認中...';
  status.className = 'va-dl-status loading';
  fetch(MUSIC_SERVER + '/api/watchlist/check', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = '新着チェック';
    if (data.ok) {
      if (data.new > 0) {
        status.textContent = data.new + '件の新着をDL開始';
        status.className = 'va-dl-status ok';
        // DL完了を待ってリスト更新
        setTimeout(() => loadVideoAudio(), 10000);
      } else {
        status.textContent = '新着なし';
        status.className = 'va-dl-status';
      }
    } else {
      status.textContent = data.error || 'エラー';
      status.className = 'va-dl-status err';
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = '新着チェック';
    status.textContent = 'サーバーに接続できません';
    status.className = 'va-dl-status err';
  });
});

// チャンネル管理
let watchlist = [];

let chEditMode = false;

function loadChannels() {
  const list = document.getElementById('ch-list');
  fetch(MUSIC_SERVER + '/api/watchlist')
    .then(r => r.json())
    .then(wl => {
      watchlist = wl;
      renderChannels();
    })
    .catch(() => {});
}

function renderChannels() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  watchlist.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'ch-item';
    if (chEditMode) {
      div.innerHTML = `
        <span class="ch-name">${ch.name}</span>
        <button class="ch-unsub">解除</button>
      `;
      div.querySelector('.ch-unsub').addEventListener('click', () => {
        if (!confirm('「' + ch.name + '」を解除しますか？')) return;
        fetch(MUSIC_SERVER + '/api/watchlist/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: ch.url })
        }).then(() => { watchlist = watchlist.filter(w => w.url !== ch.url); renderChannels(); });
      });
    } else {
      div.innerHTML = `<span class="ch-name">${ch.name}</span>`;
    }
    list.appendChild(div);
  });
}

document.getElementById('ch-edit').addEventListener('click', function() {
  chEditMode = !chEditMode;
  this.textContent = chEditMode ? '完了' : '編集';
  renderChannels();
});

document.getElementById('ch-toggle').addEventListener('click', () => {
  const s = document.getElementById('ch-search');
  s.classList.toggle('open');
  if (s.classList.contains('open')) document.getElementById('ch-query').focus();
});

let searchTimer = null;
document.getElementById('ch-query').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('ch-results').innerHTML = ''; return; }
  searchTimer = setTimeout(() => {
    document.getElementById('ch-results').innerHTML = '<div class="va-empty">検索中...</div>';
    fetch(MUSIC_SERVER + '/api/yt-search-channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q })
    })
    .then(r => r.json())
    .then(data => {
      const results = document.getElementById('ch-results');
      results.innerHTML = '';
      if (!data.results || data.results.length === 0) {
        results.innerHTML = '<div class="va-empty">見つかりません</div>';
        return;
      }
      data.results.forEach(ch => {
        const already = watchlist.some(w => w.url === ch.url || w.url === ch.url + '/videos');
        const div = document.createElement('div');
        div.className = 'ch-item';
        div.innerHTML = `
          <span class="ch-name">${ch.name}</span>
          <button class="${already ? 'ch-sub subscribed' : 'ch-add'}">${already ? '登録済' : '登録'}</button>
        `;
        if (!already) {
          div.querySelector('.ch-add').addEventListener('click', function() {
            this.disabled = true;
            this.textContent = '...';
            fetch(MUSIC_SERVER + '/api/watchlist/add', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: ch.url, name: ch.name, type: 'audio' })
            })
            .then(r => r.json())
            .then(res => {
              if (res.ok) {
                this.textContent = '登録済';
                this.className = 'ch-sub subscribed';
                watchlist = res.watchlist;
                loadChannels();
              } else {
                this.textContent = res.error || 'エラー';
              }
            });
          });
        }
        results.appendChild(div);
      });
    })
    .catch(() => {
      document.getElementById('ch-results').innerHTML = '<div class="va-empty">検索失敗</div>';
    });
  }, 500);
});

// Service Worker
let swReady;
if ('serviceWorker' in navigator) {
  swReady = navigator.serviceWorker.register('sw.js').then(reg => {
    return navigator.serviceWorker.ready;
  });
}

// Show install hint on iOS Safari (not in standalone mode)
if (navigator.standalone === false) {
  document.getElementById('installHint').style.display = 'block';
}

// Listen for cache completion messages from SW
navigator.serviceWorker?.addEventListener('message', event => {
  if (event.data.type === 'CACHE_DONE') {
    // ポッドキャスト
    const btn = document.querySelector(`[data-url="${event.data.url}"]`);
    if (btn) { btn.textContent = '✓ 保存済み'; btn.classList.add('cached'); }
    // YouTube音声
    document.querySelectorAll('.va-cache').forEach(cb => {
      if (cb.closest('.va-track')?.dataset.vaUrl === event.data.url) {
        cb.textContent = '✓'; cb.classList.add('cached');
      }
    });
  }
  if (event.data.type === 'CACHE_ERROR') {
    const btn = document.querySelector(`[data-url="${event.data.url}"]`);
    if (btn) {
      btn.textContent = '⬇ ダウンロード';
    }
  }
});

// Check if a URL is already cached
async function isCached(url) {
  const cache = await caches.open('dair-v1');
  const response = await cache.match(url);
  return !!response;
}

// Clean up cached MP3s that are no longer in the feed
async function cleanOldCache(currentUrls) {
  const cache = await caches.open('dair-v1');
  const keys = await cache.keys();
  for (const req of keys) {
    if (req.url.endsWith('.mp3') && !currentUrls.includes(req.url)) {
      await cache.delete(req);
    }
  }
}

// Load episodes from feed
fetch('feed.xml')
  .then(r => r.text())
  .then(async xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = doc.querySelectorAll('item');
    const container = document.getElementById('episodes');

    // Collect all current MP3 URLs and clean old cache
    const currentUrls = Array.from(items).map(item =>
      item.querySelector('enclosure')?.getAttribute('url') || ''
    ).filter(Boolean);
    cleanOldCache(currentUrls);

    // Sort items by pubDate descending (newest first)
    const sortedItems = Array.from(items).sort((a, b) => {
      const da = new Date(a.querySelector('pubDate')?.textContent || 0);
      const db = new Date(b.querySelector('pubDate')?.textContent || 0);
      return db - da;
    });

    for (const item of sortedItems) {
      const title = item.querySelector('title')?.textContent || '';
      const desc = item.querySelector('description')?.textContent || '';
      const url = item.querySelector('enclosure')?.getAttribute('url') || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      const durRaw = item.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', 'duration')[0]?.textContent || '';
      const date = new Date(pubDate).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      // Convert HH:MM:SS to "XX分" format
      const durParts = durRaw.split(':').map(Number);
      const totalMin = durParts.length === 3 ? durParts[0] * 60 + durParts[1] : durParts[0] || 0;
      const dur = totalMin > 0 ? `${totalMin}分` : durRaw;

      const cached = await isCached(url);

      const div = document.createElement('div');
      div.className = 'episode';
      div.innerHTML = `
        <h2>${title}</h2>
        <p class="meta">${date} | ${dur}</p>
        <audio controls preload="none" src="${url}"></audio>
        <div class="ep-actions">
          <button class="dl-btn ${cached ? 'cached' : ''}" data-url="${url}">
            ${cached ? '✓ 保存済み' : '⬇ ダウンロード'}
          </button>
        </div>
        <details>
          <summary>詳細</summary>
          <div class="desc">${desc}</div>
        </details>
      `;
      container.appendChild(div);

      // Download / delete button
      const btn = div.querySelector('.dl-btn');
      btn.addEventListener('click', () => {
        if (btn.classList.contains('cached')) {
          navigator.serviceWorker?.controller?.postMessage({
            type: 'DELETE_CACHE',
            url: url
          });
          btn.textContent = '⬇ ダウンロード';
          btn.classList.remove('cached');
        } else {
          btn.textContent = 'ダウンロード中...';
          navigator.serviceWorker?.controller?.postMessage({
            type: 'CACHE_MP3',
            url: url
          });
        }
      });

      // MediaSession API for lock screen controls
      const audio = div.querySelector('audio');
      audio.addEventListener('play', () => {
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: title,
            artist: 'デイリーAIラジオ',
            album: 'デイリーAIラジオ',
            artwork: [
              { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
              { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
            ]
          });
          navigator.mediaSession.setActionHandler('play', () => audio.play());
          navigator.mediaSession.setActionHandler('pause', () => audio.pause());
          navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
          navigator.mediaSession.setActionHandler('seekforward', () => { audio.currentTime += 30; });
        }
      });
    }
  });
</script>
</body>
</html>
