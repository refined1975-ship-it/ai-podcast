<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily News</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; max-width: 700px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 24px; margin-bottom: 4px; }
.subtitle { color: #666; margin-bottom: 30px; }
.episode { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.episode h2 { font-size: 18px; margin-bottom: 8px; }
.episode .date { color: #666; font-size: 14px; margin-bottom: 12px; }
.episode audio { width: 100%; margin-bottom: 12px; }
.episode details { font-size: 14px; color: #444; }
.episode summary { cursor: pointer; font-weight: 600; margin-bottom: 8px; }
.episode pre { white-space: pre-wrap; font-family: inherit; margin-top: 8px; line-height: 1.6; }
.disclaimer { margin-top: 30px; padding: 16px; background: #f5f5f5; border-radius: 8px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<h1>AI Daily News</h1>
<p class="subtitle">POWERED BY AI</p>
<div id="episodes"></div>
<div class="disclaimer">
  This podcast is auto-generated by AI. Accuracy is not guaranteed.
</div>
<script>
fetch('feed.xml')
  .then(r => r.text())
  .then(xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = doc.querySelectorAll('item');
    const container = document.getElementById('episodes');
    items.forEach(item => {
      const title = item.querySelector('title')?.textContent || '';
      const desc = item.querySelector('description')?.textContent || '';
      const url = item.querySelector('enclosure')?.getAttribute('url') || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      const duration = item.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', 'duration')[0]?.textContent || '';
      const date = new Date(pubDate).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      const div = document.createElement('div');
      div.className = 'episode';
      div.innerHTML = `
        <h2>${title}</h2>
        <p class="date">${date} | ${duration}</p>
        <audio controls preload="none" src="${url}"></audio>
        <details>
          <summary>詳細</summary>
          <pre>${desc}</pre>
        </details>
      `;
      container.appendChild(div);
    });
  });
</script>
</body>
</html>
