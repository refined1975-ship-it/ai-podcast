<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAST">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>CAST</title>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:baseline;gap:10px;">
      <h1>CAST</h1>
      <span class="subtitle">RADIO & AUDIO</span>
    </div>
    <button class="reload-btn" onclick="location.reload()">↻</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="radio">ラジオ</div>
  <div class="tab" data-tab="youtube">YouTube音声</div>
</div>

<div class="tab-content active" id="tab-radio">
  <div id="episodes"></div>
</div>

<div class="tab-content" id="tab-youtube">
  <div id="va-list"></div>
  <div class="ch-section">
    <div class="ch-header">
      <h3>登録チャンネル</h3>
      <div style="display:flex;gap:6px">
        <button class="ch-toggle" id="ch-edit">編集</button>
        <button class="ch-toggle" id="ch-toggle">検索</button>
      </div>
    </div>
    <div class="ch-search" id="ch-search">
      <input class="ch-input" id="ch-query" placeholder="チャンネル名で検索..." />
      <div class="ch-results" id="ch-results"></div>
    </div>
    <div id="ch-list"></div>
  </div>
</div>

<!-- Mini bar -->
<div class="player-mini" id="playerMini">
  <div class="player-mini-title" id="playerMiniTitle">-</div>
  <button class="player-mini-btn" id="playerMiniBtn"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
  <div class="player-mini-progress" id="playerMiniProgress">
    <div class="player-mini-fill" id="playerMiniFill"></div>
  </div>
  <span class="player-mini-time" id="playerMiniTime">0:00</span>
</div>

<!-- Floating player -->
<div class="player" id="player">
  <div class="player-card">
    <div class="player-title" id="playerTitle">-</div>
    <div class="player-desc" id="playerDesc"></div>
    <div class="player-progress" id="playerProgress">
      <div class="player-progress-fill" id="playerFill"></div>
    </div>
    <div class="player-time-row" style="display:flex;justify-content:space-between;margin-bottom:16px;">
      <span class="player-time" id="playerTime">0:00</span>
      <span class="player-time" id="playerDuration">0:00</span>
    </div>
    <div class="player-controls">
      <button class="player-ctrl play" id="playerBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    </div>
  </div>
</div>
<audio id="audio"></audio>

<div class="disclaimer">
  AI自動生成のため内容の正確性は保証されません
</div>

<script src="app.js"></script>
</body>
</html>
